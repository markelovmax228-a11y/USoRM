<h1>Новости</h1>

<a href="/profile.html">Профиль</a>
<a href="/login.html">Вход</a>

<textarea id="postText"></textarea>
<button onclick="createPost()">Опубликовать</button>

<div id="posts"></div>

<script>
function loadPosts() {
    fetch("/posts")
    .then(res => res.json())
    .then(data => {
        posts.innerHTML = "";
        data.forEach(p => {
            posts.innerHTML += `
            <div class="post">
                <b>${p.author}</b><br>
                ${p.content}
            </div>`;
        });
    });
}

function createPost() {
    fetch("/posts", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({content: postText.value})
    }).then(loadPosts);
}

loadPosts();
</script>
