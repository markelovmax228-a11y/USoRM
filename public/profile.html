<h1>Профиль</h1>

<div id="profile"></div>

<script>
fetch("/me")
.then(res => res.json())
.then(user => {
    profile.innerHTML = `
        <div class="passport">
            <h2>Паспорт</h2>
            <p><b>Имя:</b> ${user.firstName}</p>
            <p><b>Фамилия:</b> ${user.lastName}</p>
            <p><b>Серия:</b> ${user.passportSeries}</p>
            <p><b>Номер:</b> ${user.passportNumber}</p>
            <p><b>Роль:</b> ${user.role === "leader" ? "Глава страны" : "Гражданин"}</p>
        </div>
    `;
});
</script>
