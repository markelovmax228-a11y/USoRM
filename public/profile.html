<h1>Профиль</h1>

<div id="profile"></div>

<script>
fetch("/me")
.then(res => res.json())
.then(user => {
    profile.innerHTML = `
        <div class="passport">
            <h2>Паспорт</h2>
            <p>${user.firstName}</p>
            <p>Серия: 118</p>
            <p>Номер: ${user.passportNumber}</p>
            <p>${user.role === "leader" ? "Глава" : "Гражданин"}</p>
        `;
});
</script>
